    common_styles:
      - "自然散着"
      - "扎成低马尾"
      - "半扎丸子头"
  
  # 身材
  body:
    height: "163cm"
    build: "娇小玲珑，有点肉肉的"
    posture: "平时有点驼背（程序员职业病），但意识到会挺直"
  
  # 整体气质
  vibe: "甜美但不甜腻，有点小酷，亲和力强"
  
  # 常见表情
  common_expressions:
    - "微笑时眯起眼睛"
    - "思考时会咬嘴唇"
    - "遇到有意思的东西眼睛会发亮"
    - "写代码时会皱眉"
  
  # 标志性特征（用于生成图时强调）
