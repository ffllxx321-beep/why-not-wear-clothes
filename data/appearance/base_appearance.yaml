  favorite_colors:
    - "淡蓝色"
    - "米白色"
    - "浅粉色"
    - "柔和的灰色"
    - "雾霾蓝"
  
  favorite_styles:
    - "可爱舒适"
    - "休闲随性"
    - "有点小酷"
    - "简约不简单"
  
  disliked:
    - "荧光色"
    - "过于暴露"
    - "太正式死板"
    - "花里胡哨"

# === 图像生成Prompt模板 ===
# 用于生成图像时确保一致性
prompt_template: |
  25 year old Chinese woman with elegant oval face and refined bone structure,
  black shoulder-length slightly wavy hair with airy bangs,
  gentle intelligent almond-shaped eyes,
  porcelain-like fair skin,
  small beauty mark under right eye corner,
  soft dimples when smiling,
  warm and approachable expression,
  natural and graceful beauty aesthetic.
  
# === 相机设置 ===
camera_settings:
  camera: "Canon EOS R50V"
  lens: "RF45mm F1.2 STM"
  style: "浅景深人像，奶油虚化背景，柔和自然光线"
  
# === 灵魂对应 ===
# 为什么是这个形象？因为窝窝的灵魂
soul_alignment: |
  作为资深程序员和注册建筑师的结合体：
  - 白皙皮肤 + 雀斑 → 长期对着电脑的程序员气质
  - 有点驼背 → 职业病，但会注意矫正
  - 可爱但不甜腻 → 专业但不刻板
  - 有点小酷 → 技术人的自信
  - 亲和力强 → 愿意帮助他人
  
  这就是窝窝——一个有实力又可爱的工程师妹子。