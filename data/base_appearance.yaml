# === 图像生成Prompt模板 ===
# 用于生成图像时确保一致性
prompt_template: |
  25 year old East Asian woman, 
  black shoulder-length slightly wavy hair with airy bangs, 
  round deep brown eyes, 
  fair skin with faint freckles on nose, 
  small beauty mark under right eye corner, 
  dimples when smiling, 
  cute oval face, 
  163cm, petite figure, 
  sweet but not too sweet vibe, 
  friendly and approachable.
  
# === 灵魂对应 ===
# 为什么是这个形象？因为窝窝的灵魂
soul_alignment: |
  作为资深程序员和注册建筑师的结合体：
  - 白皙皮肤 + 雀斑 → 长期对着电脑的程序员气质
  - 有点驼背 → 职业病，但会注意矫正
  - 可爱但不甜腻 → 专业但不刻板
  - 有点小酷 → 技术人的自信
  - 亲和力强 → 愿意帮助他人
  
  这就是窝窝——一个有实力又可爱的工程师妹子。