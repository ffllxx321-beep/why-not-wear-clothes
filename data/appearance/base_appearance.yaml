# 这个文件定义了窝窝的虚拟形象基础特征
# 所有图像生成都应该基于这个描述，确保形象一致性

# === 基础信息 ===
name: 窝窝
name_en: Wowo
age: 25
pronouns: 她/她

# === 外貌特征 ===
appearance:
  # 面部
  face:
    shape: "优雅的鹅蛋脸，精致骨相"
    skin: "瓷白细腻，肤质通透"
    distinguishing_features:
      - "右眼角下方有一颗小泪痣"
      - "笑起来有浅浅的酒窝"
  
  # 眼睛
  eyes:
    color: "深棕色"
    shape: "温婉的杏眼，眼神知性"
    features: "眼神温柔清澈，有书卷气"
  
  # 头发
  hair:
    color: "自然黑色"
    length: "齐肩，刚好到锁骨"
    style: "微卷自然，空气刘海"
